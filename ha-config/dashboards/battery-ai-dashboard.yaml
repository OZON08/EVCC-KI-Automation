# Home Assistant Lovelace Dashboard – KI-Batteriesteuerung
# Als neue Dashboard-Datei einbinden oder in bestehende ui-lovelace.yaml einfügen

title: Batterie KI
views:
  - title: Übersicht
    path: battery-ai
    icon: mdi:battery-charging
    cards:
      - type: vertical-stack
        cards:
          # Status-Header
          - type: markdown
            content: >
              ## 🔋 KI-Batteriesteuerung
              {% if is_state('input_boolean.ki_batteriesteuerung_aktiv', 'on') %}
              **Status:** 🟢 Aktiv
              {% else %}
              **Status:** 🔴 Deaktiviert
              {% endif %}

          # Batterie SoC (via evcc in HA)
          - type: gauge
            entity: sensor.evcc_battery_soc
            name: "Batterie SoC"
            min: 0
            max: 100
            severity:
              green: 40
              yellow: 20
              red: 0
            needle: true

          # KI-Entscheidung
          - type: entities
            title: "Aktuelle KI-Entscheidung"
            entities:
              - entity: sensor.battery_charge_threshold
                name: "Preisschwellwert (Daily)"
                icon: mdi:currency-eur
              - type: attribute
                entity: sensor.battery_charge_threshold
                attribute: reasoning
                name: "Begründung Daily Optimizer"
                icon: mdi:brain
              - entity: sensor.battery_charge_threshold
                attribute: last_updated
                name: "Letzte Berechnung (Daily)"
                icon: mdi:clock-outline

          # Intraday Anpassung
          - type: entities
            title: "Intraday Anpassung (stündlich)"
            entities:
              - entity: sensor.battery_intraday_adjustment
                name: "Letzte Aktion"
                icon: mdi:refresh-auto
              - type: attribute
                entity: sensor.battery_intraday_adjustment
                attribute: threshold_ct
                name: "Schwellwert (ct/kWh)"
                icon: mdi:currency-eur
              - type: attribute
                entity: sensor.battery_intraday_adjustment
                attribute: discharge_action
                name: "Einspeisen"
                icon: mdi:transmission-tower-export
              - type: attribute
                entity: sensor.battery_intraday_adjustment
                attribute: reasoning
                name: "Begründung (Intraday)"
                icon: mdi:brain
              - type: attribute
                entity: sensor.battery_intraday_adjustment
                attribute: last_updated
                name: "Letzte Prüfung"
                icon: mdi:clock-outline

          # Steuerung
          - type: entities
            title: "Steuerung"
            entities:
              - entity: input_boolean.ki_batteriesteuerung_aktiv
                name: "KI-Steuerung"
              - entity: input_boolean.einspeise_logik_aktiv
                name: "Einspeise-Logik"
              - entity: input_number.min_soc_einspeisen
                name: "Min. SoC Einspeisen"
              - entity: input_select.intraday_frequenz
                name: "Intraday Häufigkeit"
              - entity: input_number.manueller_preisschwellwert
                name: "Manueller Schwellwert (0 = KI)"

          # API-Kosten
          - type: entities
            title: "API-Kosten (Claude)"
            entities:
              - entity: sensor.battery_ai_tokens_last_run
                name: "Letzter Lauf (USD)"
                icon: mdi:currency-usd
              - type: attribute
                entity: sensor.battery_ai_tokens_last_run
                attribute: input_tokens
                name: "Input-Tokens"
                icon: mdi:import
              - type: attribute
                entity: sensor.battery_ai_tokens_last_run
                attribute: output_tokens
                name: "Output-Tokens"
                icon: mdi:export
              - type: attribute
                entity: sensor.battery_ai_tokens_last_run
                attribute: workflow
                name: "Workflow"
                icon: mdi:cog
              - entity: sensor.battery_ai_cost_today
                name: "Heute (USD)"
                icon: mdi:calendar-today
              - entity: sensor.battery_ai_cost_month
                name: "Dieser Monat (USD)"
                icon: mdi:calendar-month

          # Tibber-Preise (falls Tibber-Integration in HA vorhanden)
          - type: custom:tibber-card
            title: "Tibber Preise heute/morgen"
            # Benötigt tibber-card custom component

      - type: history-graph
        title: "Verlauf (letzte 24h)"
        entities:
          - entity: sensor.battery_charge_threshold
            name: "Schwellwert (Daily)"
          - entity: sensor.battery_intraday_adjustment
            name: "Intraday Aktion"
          - entity: sensor.evcc_battery_soc
            name: "SoC"
        hours_to_show: 24
