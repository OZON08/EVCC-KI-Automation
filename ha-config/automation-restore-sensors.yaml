alias: "Batterie KI – Sensoren nach Neustart"
description: "Stellt alle virtuellen KI-Sensoren nach HA-Neustart wieder her"
mode: single
trigger:
  - platform: homeassistant
    event: start
action:
  - delay: "00:02:00"
  - service: rest_command.n8n_restore_ki_sensoren
    data: {}
  - delay: "00:00:30"
  - service: rest_command.n8n_restore_savings_sensoren
    data: {}
