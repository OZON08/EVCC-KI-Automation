# Home Assistant Input Numbers – KI-Batteriesteuerung
# 0 = KI übernimmt, >0 = manueller Schwellwert in ct/kWh

input_number:
  manueller_preisschwellwert:
    name: "Manueller Preisschwellwert"
    icon: mdi:currency-eur
    unit_of_measurement: "ct/kWh"
    min: 0
    max: 50
    step: 0.1
    initial: 0
    mode: slider
  min_soc_einspeisen:
    name: "Min. SoC Einspeisen"
    icon: mdi:battery-arrow-down
    unit_of_measurement: "%"
    min: 10
    max: 50
    step: 5
    initial: 30
    mode: slider
  einspeise_verguetung_ct:
    name: "Einspeisevergütung"
    icon: mdi:transmission-tower-export
    unit_of_measurement: "ct/kWh"
    min: 0
    max: 30
    step: 0.1
    initial: 6.7
    mode: box
